*{box-sizing:border-box}
html,body{margin:0}
body{-webkit-font-smoothing:antialiased;font-family:"EB Garamond",Georgia,serif;color:var(--cafe);
  background-color:var(--bg);background-image:var(--tile);background-repeat:repeat;background-size:300px auto}
.wrap{max-width:460px;margin:0 auto;background:transparent}
img{display:block;width:100%;height:auto}
.panel{position:relative;line-height:0;background:transparent}

/* cover (closed envelope) */
.cover{position:relative;padding-bottom:7vh}
.scrollcue{position:absolute;left:0;right:0;bottom:2.4vh;text-align:center;
  color:rgba(77,64,53,.85);font-style:italic;font-size:.88rem;letter-spacing:.04em;line-height:1.3;animation:bob 2.2s ease-in-out infinite}
.scrollcue span{display:block;font-style:normal;font-size:1.15rem;margin-top:2px;color:var(--coral)}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

/* invisible tappable hotspots */
.hot{position:absolute;display:block;border-radius:10px;-webkit-tap-highlight-color:transparent;cursor:pointer;z-index:4}
.hot:active{background:rgba(77,64,53,.10)}
.hot:focus-visible{outline:2px solid var(--coral);outline-offset:2px}

/* "Click aqui" cues: cafe text + coral arrow on top, subtle; appear within center band */
.cue{position:absolute;transform:translateX(-50%);text-align:center;line-height:1.22;
  font-family:"EB Garamond",Georgia,serif;font-style:italic;font-size:.8rem;letter-spacing:.03em;
  color:var(--cafe);text-shadow:0 1px 2px rgba(255,253,248,.6);
  opacity:0;transition:opacity .5s ease;pointer-events:none;z-index:5}
.cue.show{opacity:1}
.cue .arw{display:block;font-style:normal;font-size:1.05rem;line-height:1;margin-bottom:2px;color:var(--coral);animation:nudgeR 1.2s ease-in-out infinite}
@keyframes nudgeR{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}

/* countdown */
.countdown{padding:46px 20px 48px;text-align:center;background:transparent}
.cd-head{font-family:"Great Vibes",cursive;font-size:2.7rem;line-height:1;color:var(--cafe);margin-bottom:18px}
.cd-row{display:flex;justify-content:center;gap:10px}
.cd-box{position:relative;background:var(--box);border:1.5px solid var(--coral);border-radius:12px;min-width:64px;padding:13px 6px;box-shadow:0 8px 18px rgba(122,90,60,.14)}
.cd-box::before{content:"";position:absolute;inset:4px;border:1px solid rgba(217,161,154,.6);border-radius:8px}
.cd-num{font-family:"EB Garamond",serif;font-size:1.85rem;font-weight:500;color:var(--cafe);line-height:1}
.cd-lab{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(77,64,53,.6);margin-top:6px}
.cd-date{margin-top:18px;color:rgba(77,64,53,.7);letter-spacing:.22em;text-transform:uppercase;font-size:.72rem}

/* footer / confirmation */
.foot{padding:34px 20px 48px;text-align:center;background:transparent;color:var(--cafe)}
.f-line{font-family:"Great Vibes",cursive;font-size:2.3rem;color:var(--cafe);margin-bottom:16px;line-height:1}
.btn-wa{display:inline-flex;align-items:center;gap:9px;background:var(--cafe);color:var(--creamtxt);text-decoration:none;
  text-transform:uppercase;letter-spacing:.14em;font-size:.78rem;font-weight:600;padding:14px 26px;border-radius:999px;
  box-shadow:0 8px 16px rgba(77,64,53,.22);transition:transform .15s,background .2s}
.btn-wa:hover{background:#5c4d40}.btn-wa:active{transform:scale(.97)}
.btn-wa:focus-visible{outline:2px solid var(--coral);outline-offset:3px}
.btn-wa svg{width:18px;height:18px}
.f-date{margin-top:18px;letter-spacing:.24em;text-transform:uppercase;font-size:.7rem;color:rgba(77,64,53,.6)}

/* reveal */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .9s ease,transform .9s ease}
.reveal.in{opacity:1;transform:none}

/* floating music */
.fab{position:fixed;right:15px;bottom:15px;width:46px;height:46px;border-radius:50%;background:var(--cafe);color:var(--creamtxt);
  border:1.5px solid rgba(255,255,255,.35);display:grid;place-items:center;cursor:pointer;z-index:70;box-shadow:0 6px 18px rgba(77,64,53,.3);transition:transform .2s}
.fab:hover{transform:scale(1.07)}.fab svg{width:19px;height:19px}

@media (prefers-reduced-motion:reduce){
  .reveal,.reveal.in{opacity:1!important;transform:none!important;transition:none}
  .scrollcue,.cue .arw{animation:none}.cue{transition:opacity .2s}
}

    setN('cd-d',d);setN('cd-h',h);setN('cd-m',m);setN('cd-s',s);}
  tick();setInterval(tick,1000);
  var audio=document.getElementById('song'),fab=document.getElementById('fab'),playing=false;
  function sync(){if(!fab)return;fab.querySelector('.ico-note').style.display=playing?'none':'';fab.querySelector('.ico-pause').style.display=playing?'':'none';}
  function toggle(){var has=audio&&audio.getAttribute('src');if(!has){playing=!playing;sync();return;}if(playing){audio.pause();playing=false;sync();}else{audio.play().then(function(){playing=true;sync();}).catch(function(){playing=false;sync();});}}
  if(fab)fab.addEventListener('click',toggle);sync();
</script>
